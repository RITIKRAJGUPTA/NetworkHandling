version: "3.8"

services:
  mongo:
    image: mongo:6
    container_name: mongo1
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: ADMIN
    volumes:
      - D:\New_Projects\Login Register form forget reset password  functionality (frontend backend)/data:/data/db

  mongo-express:
    image: mongo-express
    container_name: mongo-express_2
    restart: always
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: ADMIN
      ME_CONFIG_MONGODB_URL: mongodb://admin:ADMIN@mongo:27017/
    depends_on:
      - mongo